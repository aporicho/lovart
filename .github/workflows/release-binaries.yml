name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_name: lovart-macos-arm64
            goos: darwin
            goarch: arm64
            binary_path: dist/lovart
          - runner: ubuntu-latest
            asset_name: lovart-linux-x64
            goos: linux
            goarch: amd64
            binary_path: dist/lovart
          - runner: windows-latest
            asset_name: lovart-windows-x64.exe
            goos: windows
            goarch: amd64
            binary_path: dist/lovart.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        shell: bash
        run: go test ./...

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X github.com/aporicho/lovart/internal/version.Version=${{ github.ref_name }}" -o "${{ matrix.binary_path }}" ./cmd/lovart

      - name: Smoke test binary
        shell: bash
        run: |
          "${{ matrix.binary_path }}" --version
          "${{ matrix.binary_path }}" self-test
          "${{ matrix.binary_path }}" config openai/gpt-image-2
          printf '{"jsonrpc":"2.0","id":1,"method":"tools/list"}\n' | "${{ matrix.binary_path }}" mcp

      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp "${{ matrix.binary_path }}" "release-assets/${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release-assets/${{ matrix.asset_name }}

  release-assets:
    name: Prepare release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Add installers and checksums
        shell: bash
        run: |
          cp packaging/install/install.sh release-assets/install.sh
          cp packaging/install/install.ps1 release-assets/install.ps1
          chmod +x release-assets/install.sh
          cd release-assets
          sha256sum lovart-macos-arm64 lovart-linux-x64 lovart-windows-x64.exe install.sh install.ps1 > SHA256SUMS

      - name: Smoke test installers and Linux binary
        shell: bash
        run: |
          bash packaging/install/install.sh --dry-run --json
          pwsh -File packaging/install/install.ps1 -DryRun -Json
          chmod +x release-assets/lovart-linux-x64
          release-assets/lovart-linux-x64 --version
          release-assets/lovart-linux-x64 self-test
          printf '{"jsonrpc":"2.0","id":1,"method":"tools/list"}\n' | release-assets/lovart-linux-x64 mcp

      - uses: actions/upload-artifact@v4
        with:
          name: lovart-release-assets
          path: release-assets/*

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
